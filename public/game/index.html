<!DOCTYPE html>
<html class="no-js" lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Magic Sort</title>
    <meta name="title" content="Magic Sort">
    <meta name="description" content="Magic Sort is a cozy light-themed puzzle game where you organize soft pastel liquids until every tube holds a single color.">
    <meta name="keywords" content="magic sort, pastel puzzle, color sorting, tube puzzle, cozy game, browser puzzle">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <link rel="shortcut icon" href="assets/icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/main.css">
    <script src="js/vendor/modernizr-2.6.2.min.js"></script>
    <script>
    if (navigator.userAgent.match(/IEMobile\/10\.0/)) {
        var msViewportStyle = document.createElement("style");
        msViewportStyle.appendChild(document.createTextNode("@-ms-viewport{width:device-width}"));
        document.getElementsByTagName("head")[0].appendChild(msViewportStyle);
    }
    </script>
</head>
<body>
    <div id="mainLoader"><div class="loader-orb"></div><span>0</span></div>
    <div id="mainHolder">
        <div id="notSupportHolder">
            <div class="notSupport">Your browser isn't supported.<br>Please update your browser in order to run the game.</div>
        </div>
        <div id="canvasHolder">
            <canvas id="gameCanvas" width="1280" height="768"></canvas>
        </div>
        <div id="uiLayer">
            <div id="htmlMainMenu" class="menu-ui is-hidden">
                <div class="menu-ui__panel">
                    <h1 class="menu-ui__title">Magic Sort</h1>
                    <div class="menu-ui__actions">
                        <button id="htmlStartButton" class="menu-ui__button" type="button">Start</button>
                        <button id="htmlLevelsButton" class="menu-ui__button menu-ui__button--alt" type="button">Levels</button>
                    </div>
                </div>
            </div>
            <div id="htmlLevelMenu" class="overlay-card is-hidden">
                <div class="overlay-card__panel overlay-card__panel--wide">
                    <div class="overlay-card__head">
                        <button id="htmlLevelPrev" class="chip-button chip-button--icon" type="button">&lt;</button>
                        <h2 id="htmlLevelTitle" class="overlay-card__title">Pick a Level</h2>
                        <button id="htmlLevelNext" class="chip-button chip-button--icon" type="button">&gt;</button>
                    </div>
                    <div id="htmlLevelGrid" class="level-grid"></div>
                    <div class="overlay-card__footer">
                        <button id="htmlBackFromLevels" class="chip-button" type="button">Back</button>
                    </div>
                </div>
            </div>
            <div id="htmlTubeMenu" class="overlay-card is-hidden">
                <div class="overlay-card__panel">
                    <h2 class="overlay-card__title">Choose a Tube</h2>
                    <div class="overlay-card__footer overlay-card__footer--triple">
                        <button id="htmlTubePrev" class="chip-button chip-button--icon" type="button">&lt;</button>
                        <button id="htmlTubePlay" class="chip-button chip-button--primary" type="button">Play</button>
                        <button id="htmlTubeNext" class="chip-button chip-button--icon" type="button">&gt;</button>
                    </div>
                </div>
            </div>
            <div id="htmlResultMenu" class="overlay-card is-hidden">
                <div class="overlay-card__panel">
                    <h2 id="htmlResultTitle" class="overlay-card__title">Session Complete</h2>
                    <div id="htmlResultScore" class="overlay-card__score">0 PTS</div>
                    <div class="overlay-card__footer">
                        <button id="htmlResultContinue" class="chip-button chip-button--primary" type="button">Continue</button>
                    </div>
                </div>
            </div>
            <div id="htmlConfirmMenu" class="overlay-card is-hidden">
                <div class="overlay-card__panel">
                    <h2 id="htmlConfirmTitle" class="overlay-card__title">Leave Magic Sort</h2>
                    <p id="htmlConfirmText" class="overlay-card__text">Are you sure you want to return to menu?</p>
                    <div class="overlay-card__footer overlay-card__footer--double">
                        <button id="htmlConfirmLeave" class="chip-button chip-button--danger" type="button">Leave</button>
                        <button id="htmlConfirmStay" class="chip-button" type="button">Stay</button>
                    </div>
                </div>
            </div>
            <div id="htmlSettingsMenu" class="settings-ui is-hidden">
                <button id="htmlSettingsToggle" class="settings-ui__toggle" type="button">Menu</button>
                <div id="htmlSettingsPanel" class="settings-ui__panel is-hidden">
                    <button id="htmlSoundButton" class="settings-ui__button" type="button">Sound: On</button>
                    <button id="htmlMusicButton" class="settings-ui__button" type="button">Music: On</button>
                    <button id="htmlFullscreenButton" class="settings-ui__button" type="button">Fullscreen</button>
                    <button id="htmlQuitButton" class="settings-ui__button settings-ui__button--danger" type="button">Quit</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/vendor/jquery.min.js"></script>
    <script src="js/vendor/detectmobilebrowser.js"></script>
    <script src="js/vendor/createjs.min.js"></script>
    <script src="js/vendor/TweenMax.min.js"></script>
    <script src="js/vendor/js.cookie.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/sound.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/levels.js"></script>
    <script src="js/game.js"></script>
    <script src="js/mobile.js"></script>
    <script src="js/main.js"></script>
    <script src="js/loader.js"></script>
    <script src="js/init.js"></script>
</body>
</html>
